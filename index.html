<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ひのえの四柱推命×易占い</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FFF8F0;
      --orange: #E8732A;
      --gold: #C8972A;
      --dark-orange: #B85A18;
      --light-gold: #F0D080;
      --text: #3A2A10;
      --muted: #8A6A3A;
      --border: #D4A85A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .screen {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      padding: 24px 20px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── ヘッダー共通 ── */
    .site-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .chara-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 4px;
    }
    .site-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--dark-orange);
      letter-spacing: 0.06em;
      line-height: 1.4;
    }
    .site-subtitle { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }

    /* ── TOPに戻る ── */
    .btn-top {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-bottom: 16px;
      align-self: flex-start;
    }
    .btn-top:hover { border-color: var(--gold); color: var(--dark-orange); }

    /* ── カード類 ── */
    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      width: 100%;
      margin-bottom: 16px;
    }
    .label { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
    .selects { display: flex; gap: 8px; }
    select {
      flex: 1;
      padding: 10px 2px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      text-align: center;
      cursor: pointer;
    }
    .btn-main {
      width: 100%;
      padding: 14px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-main:hover { background: var(--dark-orange); }
    .btn-main:disabled { opacity: 0.5; cursor: default; }
    .btn-sub {
      padding: 11px 20px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-sub:hover { border-color: var(--gold); }

    /* ── Screen 2: Cast ── */
    #screen-cast { justify-content: flex-start; text-align: center; }
    .cast-header { text-align: center; margin-bottom: 10px; }
    .kan-badge {
      background: var(--light-gold);
      color: var(--dark-orange);
      border-radius: 24px;
      padding: 8px 22px;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .cast-hint { color: var(--muted); font-size: 0.88rem; }
    #sticks {
      display: flex;
      gap: 7px;
      align-items: flex-end;
      justify-content: center;
      height: 140px;
      margin: 8px 0;
    }
    .stick {
      width: 6px;
      border-radius: 3px;
      background: linear-gradient(to bottom, var(--light-gold), var(--gold));
      transform-origin: center bottom;
    }
    .stick:nth-child(1) { height: 130px; }
    .stick:nth-child(2) { height: 110px; }
    .stick:nth-child(3) { height: 140px; }
    .stick:nth-child(4) { height: 120px; }
    .stick:nth-child(5) { height: 135px; }
    .stick:nth-child(6) { height: 115px; }
    .stick:nth-child(7) { height: 125px; }
    .stick:nth-child(8) { height: 108px; }
    .stick.shuffling { animation: shuf 0.22s ease-in-out infinite alternate; }
    .stick:nth-child(1).shuffling { animation-delay: 0.00s; }
    .stick:nth-child(2).shuffling { animation-delay: 0.05s; }
    .stick:nth-child(3).shuffling { animation-delay: 0.10s; }
    .stick:nth-child(4).shuffling { animation-delay: 0.03s; }
    .stick:nth-child(5).shuffling { animation-delay: 0.08s; }
    .stick:nth-child(6).shuffling { animation-delay: 0.13s; }
    .stick:nth-child(7).shuffling { animation-delay: 0.06s; }
    .stick:nth-child(8).shuffling { animation-delay: 0.11s; }
    @keyframes shuf {
      from { transform: rotate(-14deg) translateY(-6px); }
      to   { transform: rotate(14deg) translateY(6px); }
    }
    #btn-cast {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold) 0%, var(--orange) 100%);
      color: white;
      border: none;
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(200,151,42,0.45);
      transition: transform 0.1s, box-shadow 0.1s;
      line-height: 1.5;
      margin: 6px 0;
    }
    #btn-cast:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(200,151,42,0.3); }

    /* ── Screen 3: Result ── */
    .result-header { text-align: center; margin-bottom: 12px; }
    .result-header p { color: var(--muted); font-size: 0.82rem; }
    .pair-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .pair-side { flex: 1; text-align: center; }
    .pair-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .pair-icon { font-size: 2.2rem; margin-bottom: 4px; line-height: 1; }
    .pair-name { font-size: 1.05rem; font-weight: 800; color: var(--dark-orange); }
    .pair-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .pair-x { color: var(--gold); font-size: 1.4rem; font-weight: 700; flex-shrink: 0; }
    .message-box {
      background: linear-gradient(135deg, #FFF4E0, #FFFAF5);
      border: 1px solid var(--light-gold);
      border-radius: 16px;
      padding: 22px 20px;
      width: 100%;
      text-align: center;
      margin-bottom: 16px;
    }
    .message-label { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 12px; }
    .message-text { font-size: 1.02rem; line-height: 1.85; color: var(--text); }
    .btn-row { display: flex; gap: 10px; width: 100%; margin-bottom: 10px; }
    .btn-row .btn-main { background: var(--gold); }
    .btn-row .btn-main:hover { background: var(--dark-orange); }
    .course-link {
      display: block;
      text-align: center;
      color: var(--orange);
      font-size: 0.88rem;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    .course-link:hover { color: var(--dark-orange); }
    [hidden] { display: none !important; }
  </style>
</head>
<body>

<!-- Screen 1: 生年月日入力 -->
<div id="screen-input" class="screen">
  <div class="site-header" style="margin-top: 20px;">
    <img src="chara1.png" alt="太陽キャラクター" class="chara-img">
    <div class="site-title">ひのえの<br>四柱推命×易占い</div>
    <p class="site-subtitle">生年月日から今日の流れを読み解く</p>
  </div>
  <div class="card">
    <p class="label">生年月日を入力してください</p>
    <div class="selects">
      <select id="sel-year"></select>
      <select id="sel-month"></select>
      <select id="sel-day"></select>
    </div>
  </div>
  <button class="btn-main" id="btn-decide">決定 →</button>
</div>

<!-- Screen 2: 念じてクリック -->
<div id="screen-cast" class="screen" hidden>
  <button class="btn-top" id="btn-top-cast">← TOPに戻る</button>
  <div class="cast-header">
    <img src="chara1.png" alt="太陽キャラクター" class="chara-img">
    <div class="site-title">四柱推命×易占い</div>
  </div>
  <div class="kan-badge" id="cast-kan-label"></div>
  <p class="cast-hint">目を閉じて、今日の自分を思い浮かべてください</p>
  <div id="sticks">
    <div class="stick"></div><div class="stick"></div>
    <div class="stick"></div><div class="stick"></div>
    <div class="stick"></div><div class="stick"></div>
    <div class="stick"></div><div class="stick"></div>
  </div>
  <button id="btn-cast">念じて<br>クリック</button>
  <p class="cast-hint" style="margin-top:6px;">八卦を引く</p>
</div>

<!-- Screen 3: 結果 -->
<div id="screen-result" class="screen" hidden>
  <button class="btn-top" id="btn-top-result">← TOPに戻る</button>
  <div class="result-header">
    <img src="chara1.png" alt="太陽キャラクター" style="width:60px;height:60px;object-fit:contain;margin-bottom:4px;">
    <p>ひのえからのメッセージ</p>
  </div>
  <div class="pair-card">
    <div class="pair-side">
      <div class="pair-label">あなた</div>
      <div class="pair-icon" id="res-kan-icon"></div>
      <div class="pair-name" id="res-kan-name"></div>
      <div class="pair-sub" id="res-kan-type"></div>
    </div>
    <div class="pair-x">×</div>
    <div class="pair-side">
      <div class="pair-label">今日</div>
      <div class="pair-icon" id="res-hak-icon"></div>
      <div class="pair-name" id="res-hak-name"></div>
      <div class="pair-sub" id="res-hak-type"></div>
    </div>
  </div>
  <div class="message-box">
    <div class="message-label">今日のメッセージ</div>
    <p class="message-text" id="res-message"></p>
  </div>
  <div class="btn-row">
    <button class="btn-main" id="btn-again">もう一度引く</button>
    <button class="btn-sub" id="btn-clear">クリア</button>
  </div>
  <a href="#" class="course-link" id="course-link">もっと深く知りたい方はこちら →</a>
</div>

const LS_KEY = 'hinoe_omikuji_birthday';

// ── 計算ロジック（am.html 流用）──────────────────────────────────────────
function calcJDN(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524;
}
function calcNicchuu(year, month, day) {
  const jdn = calcJDN(year, month, day);
  const idx = ((jdn + 49) % 60 + 60) % 60;
  return KAN[idx % 10];
}

// ── 効果音（Web Audio API）────────────────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// 筮竹をまわす音：竹筒の中で棒が回転する「シャー＋コン」
function playShuffle() {
  const ctx = getCtx();
  const now = ctx.currentTime;
  const dur = 3.2;
  const sr = ctx.sampleRate;

  // ── 回転の「シャー」：バンドパスノイズ + 回転LFO ──
  const nLen = Math.floor(sr * dur);
  const nBuf = ctx.createBuffer(1, nLen, sr);
  const nData = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nData[i] = Math.random() * 2 - 1;

  const nSrc = ctx.createBufferSource();
  nSrc.buffer = nBuf;

  const bp1 = ctx.createBiquadFilter();
  bp1.type = 'bandpass'; bp1.frequency.value = 850; bp1.Q.value = 2.5;
  const bp2 = ctx.createBiquadFilter();
  bp2.type = 'bandpass'; bp2.frequency.value = 1500; bp2.Q.value = 3;

  const nGain = ctx.createGain();
  nGain.gain.setValueAtTime(0, now);
  nGain.gain.linearRampToValueAtTime(0.13, now + 0.3);
  nGain.gain.setValueAtTime(0.13, now + dur - 0.6);
  nGain.gain.linearRampToValueAtTime(0, now + dur);

  nSrc.connect(bp1); bp1.connect(bp2); bp2.connect(nGain); nGain.connect(ctx.destination);
  nSrc.start(now); nSrc.stop(now + dur);

  // 回転リズムLFO（約3回転/秒）
  const lfo = ctx.createOscillator();
  const lfoG = ctx.createGain();
  lfo.type = 'sine'; lfo.frequency.value = 3.2;
  lfoG.gain.value = 0.055;
  lfo.connect(lfoG); lfoG.connect(nGain.gain);
  lfo.start(now); lfo.stop(now + dur);

  // ── 棒が筒壁に当たる「コン」音 ──
  function stickHit(t) {
    const buf = ctx.createBuffer(1, Math.floor(sr * 0.09), sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.011));
    }
    const src = ctx.createBufferSource(); src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 550 + Math.random() * 350; bp.Q.value = 7;
    const g = ctx.createGain(); g.gain.value = 0.22 + Math.random() * 0.1;
    src.connect(bp); bp.connect(g); g.connect(ctx.destination);
    src.start(t);
    // 同じ回転でダブル打ち（棒同士が交互に当たる）
    if (Math.random() > 0.45) {
      const src2 = ctx.createBufferSource(); src2.buffer = buf;
      const g2 = ctx.createGain(); g2.gain.value = 0.12 + Math.random() * 0.06;
      src2.connect(bp); bp.connect(g2); g2.connect(ctx.destination);
      src2.start(t + 0.07 + Math.random() * 0.04);
    }
  }

  // 回転周期（約0.31秒）でヒット
  let t = now + 0.18;
  while (t < now + dur - 0.25) {
    stickHit(t);
    t += 0.29 + Math.random() * 0.08;
  }
}

// 結果音：チベタンボウル/銅鑼風の余韻ある鐘
function playDing() {
  const ctx = getCtx();
  const now = ctx.currentTime;

  // 基音 + 倍音（倍音比はボウル特有の非整数）
  const partials = [
    { freq: 528, gain: 0.38, decay: 4.5 },
    { freq: 880, gain: 0.18, decay: 3.2 },
    { freq: 1320, gain: 0.10, decay: 2.4 },
    { freq: 1848, gain: 0.06, decay: 1.8 },
    { freq: 2200, gain: 0.04, decay: 1.2 },
  ];

  // 打音（アタック）
  const clickBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.025), ctx.sampleRate);
  const cd = clickBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1) * Math.exp(-i / 60);
  const clickSrc = ctx.createBufferSource();
  clickSrc.buffer = clickBuf;
  const clickGain = ctx.createGain();
  clickGain.gain.value = 0.15;
  clickSrc.connect(clickGain);
  clickGain.connect(ctx.destination);
  clickSrc.start(now);

  // 倍音列
  partials.forEach(({ freq, gain, decay }) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(gain, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + decay);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + decay + 0.1);
  });
}

// ── 画面遷移 ──────────────────────────────────────────────────────────────
function showScreen(id) {
  ['screen-input', 'screen-cast', 'screen-result'].forEach(s => {
    document.getElementById(s).hidden = (s !== id);
  });
  window.scrollTo(0, 0);
}

// ── セレクトボックス初期化 ────────────────────────────────────────────────
function initSelects() {
  const yEl = document.getElementById('sel-year');
  const mEl = document.getElementById('sel-month');
  const dEl = document.getElementById('sel-day');
  const thisYear = new Date().getFullYear();
  for (let y = thisYear; y >= 1920; y--) {
    yEl.insertAdjacentHTML('beforeend', `<option value="${y}">${y}年</option>`);
  }
  for (let m = 1; m <= 12; m++) mEl.insertAdjacentHTML('beforeend', `<option value="${m}">${m}月</option>`);
  for (let d = 1; d <= 31; d++) dEl.insertAdjacentHTML('beforeend', `<option value="${d}">${d}日</option>`);
}

function validateDate(y, m, d) {
  const dt = new Date(y, m - 1, d);
  return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
}

// ── おみくじロジック ──────────────────────────────────────────────────────
let currentKanIdx = 0;

function goCast(y, m, d) {
  currentKanIdx = KAN.indexOf(calcNicchuu(y, m, d));
  const k = currentKanIdx;
  document.getElementById('cast-kan-label').textContent = `あなたは ${KAN[k]}（${KAN_READ[k]}）${KAN_TYPE[k]}`;
  showScreen('screen-cast');
}

function showResult() {
  const k = currentKanIdx;
  const h = Math.floor(Math.random() * 8);
  document.getElementById('res-kan-icon').textContent = KAN_ICON[k];
  document.getElementById('res-kan-name').textContent = `${KAN[k]}（${KAN_READ[k]}）`;
  document.getElementById('res-kan-type').textContent = `${KAN_TYPE[k]}　${KAN_DESC[k]}`;
  document.getElementById('res-hak-icon').textContent = HAKKE_ICON[h];
  document.getElementById('res-hak-name').textContent = `${HAKKE[h]}（${HAKKE_READ[h]}）`;
  document.getElementById('res-hak-type').textContent = HAKKE_NAME[h];
  document.getElementById('res-message').textContent = MSG[k][h];
  showScreen('screen-result');
}

function startCast() {
  const btn = document.getElementById('btn-cast');
  const sticks = document.querySelectorAll('.stick');
  btn.disabled = true;
  sticks.forEach(s => s.classList.add('shuffling'));
  playShuffle();
  setTimeout(() => {
    sticks.forEach(s => s.classList.remove('shuffling'));
    playDing();
    btn.disabled = false;
    showResult();
  }, 3200);
}

// ── 初期化 ────────────────────────────────────────────────────────────────
function init() {
  initSelects();

  const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
  if (saved && validateDate(saved.year, saved.month, saved.day)) {
    document.getElementById('sel-year').value = saved.year;
    document.getElementById('sel-month').value = saved.month;
    document.getElementById('sel-day').value = saved.day;
    goCast(saved.year, saved.month, saved.day);
  }

  document.getElementById('btn-decide').addEventListener('click', () => {
    const y = +document.getElementById('sel-year').value;
    const m = +document.getElementById('sel-month').value;
    const d = +document.getElementById('sel-day').value;
    if (!validateDate(y, m, d)) { alert('正しい日付を入力してください'); return; }
    localStorage.setItem(LS_KEY, JSON.stringify({ year: y, month: m, day: d }));
    goCast(y, m, d);
  });

  document.getElementById('btn-cast').addEventListener('click', startCast);
  document.getElementById('btn-again').addEventListener('click', () => showScreen('screen-cast'));
  document.getElementById('btn-clear').addEventListener('click', () => {
    localStorage.removeItem(LS_KEY);
    showScreen('screen-input');
  });
  document.getElementById('btn-top-cast').addEventListener('click', () => showScreen('screen-input'));
  document.getElementById('btn-top-result').addEventListener('click', () => showScreen('screen-input'));
}

document.addEventListener('DOMContentLoaded', init);
</script>
